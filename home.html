<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת שעות – דף הבית</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; margin: 0; padding: 0; background: #f7f7f7; }

        .hamburger {
            position: fixed; top: 15px; right: 15px;
            width: 35px; height: 30px; cursor: pointer; z-index: 1000;
        }
        .hamburger div {
            width: 100%; height: 5px; background: #333;
            margin: 6px 0; border-radius: 5px;
        }

        .side-menu {
            position: fixed; top: 0; right: -250px;
            width: 250px; height: 100%; background: #333;
            padding-top: 60px; transition: 0.3s; z-index: 999;
        }
        .side-menu a {
            display: block; padding: 15px; color: white;
            text-decoration: none; border-bottom: 1px solid #444;
        }
        .side-menu.open { right: 0; }

        header {
            background: #4CAF50; color: white;
            padding: 15px; text-align: center; font-size: 22px;
        }

        .container { padding: 20px; }

        table {
            width: 100%; border-collapse: collapse; background: white; margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc; padding: 8px; text-align: center; font-size: 14px;
        }
        th { background: #eaeaea; }

        button {
            padding: 5px 10px;
            font-size: 12px;
            margin: 2px;
        }

        .top-actions {
            margin-top: 10px;
        }

        .top-actions button {
            width: 100%;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<header>מערכת שעות – דף הבית</header>

<div class="hamburger" onclick="toggleMenu()">
    <div></div><div></div><div></div>
</div>

<div id="sideMenu" class="side-menu">
    <a href="/home.html?key=ShellySecureKey_9843_2024_XYZ">דף הבית</a>
    <a href="/children.html?key=ShellySecureKey_9843_2024_XYZ">ניהול ילדים</a>
    <a href="/visit_add.html?key=ShellySecureKey_9843_2024_XYZ">שיבוץ ילד</a>
</div>

<div class="container">
    <div class="top-actions">
        <button onclick="exportAll()">ייצוא מערכת כללית כתמונה</button>
    </div>

    <table id="scheduleTable">
        <thead>
            <tr>
                <th>ילד</th>
                <th>הורה</th>
                <th>טלפון</th>
                <th>כתובת</th>
                <th>יום</th>
                <th>התחלה</th>
                <th>סיום</th>
                <th>פעולות</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const KEY = "ShellySecureKey_9843_2024_XYZ";

function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("open");
}

async function loadSchedule() {
    const res = await fetch(`/api/schedule?key=${KEY}`);
    const data = await res.json();

    const tbody = document.querySelector("#scheduleTable tbody");
    tbody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.child_name}</td>
            <td>${row.parent_name || ""}</td>
            <td>${row.phone || ""}</td>
            <td>${row.address || ""}</td>
            <td>${row.day}</td>
            <td>${row.start_time}</td>
            <td>${row.end_time}</td>
            <td>
                <button onclick="editVisit(${row.id})">עריכה</button>
                <button onclick="deleteVisit(${row.id})">מחיקה</button>
                <button onclick="exportChild(${row.child_id})">ייצוא ילד</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

async function deleteVisit(id) {
    if (!confirm("למחוק את השיבוץ?")) return;
    const res = await fetch(`/api/schedule/delete/${id}?key=${KEY}`, {
        method: "POST"
    });
    if (res.ok) {
        loadSchedule();
    } else {
        alert("שגיאה במחיקה");
    }
}

function editVisit(id) {
    window.location.href = `/visit_edit.html?key=${KEY}&id=${id}`;
}

function exportAll() {
    window.location.href = `/export/image/all?key=${KEY}`;
}

function exportChild(childId) {
    window.location.href = `/export/image/child/${childId}?key=${KEY}`;
}

loadSchedule();
</script>

</body>
</html>
