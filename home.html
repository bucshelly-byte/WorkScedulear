<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת שעות</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; padding: 20px; direction: rtl; }
        h1 { margin-bottom: 20px; }
        .menu {
            margin-bottom: 25px;
        }
        .menu a {
            display: inline-block;
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-left: 10px;
        }
        .menu a:hover {
            background: #45a049;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>

<h1>מערכת שעות</h1>

<div class="menu">
    <a href="/children?key=ShellySecureKey_9843_2024_XYZ">ניהול ילדים</a>
    <a href="/schedule?key=ShellySecureKey_9843_2024_XYZ">ניהול משמרות</a>
    <a href="/export?key=ShellySecureKey_9843_2024_XYZ">ייצוא לאקסל</a>
</div>

<h2>כל המשמרות</h2>

<table id="scheduleTable">
    <thead>
        <tr>
            <th>ילד</th>
            <th>יום</th>
            <th>שעת התחלה</th>
            <th>עד שעה</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const KEY = "ShellySecureKey_9843_2024_XYZ";

async function loadSchedule() {
    const res = await fetch(`/api/schedule?key=${KEY}`);
    const data = await res.json();

    const tbody = document.querySelector("#scheduleTable tbody");
    tbody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.name}</td>
            <td>${row.day}</td>
            <td>${row.start_time}</td>
            <td>${row.end_time}</td>
        `;
        tbody.appendChild(tr);
    });
}

loadSchedule();
</script>

</body>
</html>
