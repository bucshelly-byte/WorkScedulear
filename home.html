<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת שעות</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>מערכת שעות</h2>

<table border="1" cellpadding="6" cellspacing="0">
    <tr>
        <th>ילד</th>
        <th>יום</th>
        <th>שעת התחלה</th>
        <th>עד שעה</th>
    </tr>

    {% for row in schedule %}
    <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.day }}</td>
        <td>{{ row.start_time }}</td>
        <td>{{ row.end_time }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
