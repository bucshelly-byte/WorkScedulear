<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול</title>

    <style>
        body {
            margin: 0;
            font-family: "Alef", Arial;
            background: #fdfaff;
            color: #444;
        }

        header {
            background: #c8a8ff;
            padding: 14px;
            font-size: 22px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .burger {
            font-size: 28px;
            cursor: pointer;
        }

        .menu {
            position: fixed;
            top: 0;
            right: -260px;
            width: 260px;
            height: 100%;
            background: #ffffff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.15);
            padding: 20px;
            transition: 0.3s;
            z-index: 999;
        }

        .menu.open {
            right: 0;
        }

        .menu a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            background: #e8d9ff;
            color: #5a3e9b;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .menu a:hover {
            background: #d9c4ff;
        }

        .content {
            padding: 20px;
        }
    </style>

    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("open");
        }
    </script>
</head>

<body>

<header>
    <div id="pageTitle">מערכת ניהול</div>
    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<div id="menu" class="menu">
    <a onclick="navigate('home')">מבט שבועי</a>
    <a onclick="navigate('visit_add')">הוספת שיבוץ</a>
    <a onclick="navigate('children')">ניהול ילדים</a>
</div>

<div id="app" class="content">
    טוען...
</div>

<script src="/static/app.js"></script>

</body>
</html>
