{% extends "base.html" %}
{% block content %}

<h2>הוספת שיבוץ</h2>

<form method="post">

    <label>ילד</label>
    <select name="child_id">
        {% for c in children %}
            <option value="{{ c.id }}"
                {% if child_id == c.id %}selected{% endif %}>
                {{ c.name }}
            </option>
        {% endfor %}
    </select>

    <label>תאריך</label>
    <input type="date" name="date" value="{{ today }}" required>

    <label>טווח שעה</label>
    <select name="slot">
        {% for s,e in slots %}
            <option value="{{ s }}-{{ e }}">{{ s }} - {{ e }}</option>
        {% endfor %}
    </select>

    <button class="btn">שמור</button>
</form>

{% endblock %}
