<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>לוח זמנים</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            text-align: center;
            background: #f5f5f5;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
            background: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        td {
            height: 50px;
        }
        .child {
            font-weight: bold;
            color: #2a2a2a;
        }
    </style>
</head>
<body>

<h1>לוח זמנים</h1>

<table>
    <thead>
        <tr>
            <th>יום</th>
            {% for slot in time_slots %}
                <th>{{ slot[0] }} - {{ slot[1] }}</th>
            {% endfor %}
        </tr>
    </thead>

    <tbody>
        {% for day in days %}
        <tr>
            <td>{{ day }}</td>

            {% for slot in time_slots %}
                {% set key = slot[0] ~ '-' ~ slot[1] %}
                <td>
                    {% if schedule[day][key] %}
                        <span class="child">{{ schedule[day][key] }}</span>
                    {% else %}
                        -
                    {% endif %}
                </td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
