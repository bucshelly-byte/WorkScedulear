<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת שיבוצים</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #6366f1;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-direction: row-reverse;
            border-bottom: 1px solid rgba(148,163,184,0.2);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1001;
        }

        .burger {
            font-size: 24px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 998;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        nav.menu {
            width: 260px;
            background: rgba(15,23,42,0.97);
            border-left: 1px solid rgba(148,163,184,0.2);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;

            position: fixed;
            top: 0;
            right: -300px;
            height: 100vh;
            transition: right 0.35s ease;
            z-index: 999;
        }

        nav.menu.open {
            right: 0;
        }

        nav.menu a {
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
        }

        nav.menu a:hover {
            background: rgba(255,255,255,0.12);
        }

        @media (min-width: 900px) {
            .overlay { display: none; }
            nav.menu {
                position: static;
                height: auto;
                right: 0;
                width: 230px;
            }
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 50px);
        }

        .content-wrapper {
            flex: 1;
            padding: 16px;
        }

        .card {
            background: rgba(15,23,42,0.9);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(148,163,184,0.2);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid rgba(148,163,184,0.6);
            color: var(--text-main);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .field input,
        .field select {
            width: 100%;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid rgba(148,163,184,0.4);
            background: rgba(15,23,42,0.8);
            color: var(--text-main);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border-bottom: 1px solid rgba(148,163,184,0.2);
            padding: 6px 8px;
            text-align: center;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
        }

        .icon-btn {
            cursor: pointer;
            margin: 0 3px;
        }

        /* לוח שעות */
        .calendar-container {
            overflow-x: auto;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: 70px repeat(5, 1fr);
            border: 1px solid rgba(148,163,184,0.3);
            border-radius: 10px;
            overflow: hidden;
            font-size: 12px;
        }

        .calendar-header {
            background: rgba(15,23,42,0.95);
            border-bottom: 1px solid rgba(148,163,184,0.3);
        }

        .calendar-header div {
            padding: 6px;
            text-align: center;
            border-left: 1px solid rgba(148,163,184,0.2);
        }

        .calendar-row {
            display: contents;
        }

        .calendar-time {
            background: rgba(15,23,42,0.9);
            border-top: 1px solid rgba(148,163,184,0.2);
            padding: 4px;
            text-align: center;
        }

        .calendar-cell {
            border-top: 1px solid rgba(31,41,55,0.8);
            border-left: 1px solid rgba(31,41,55,0.8);
            min-height: 26px;
            position: relative;
        }

        .slot-block {
            position: absolute;
            inset: 2px;
            border-radius: 6px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .legend {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }

        .disabled-option {
            color: #6b7280;
        }
    </style>

    <script>
        const KEY = "ShellySecureKey_9843_2024_XYZ";

        function toggleMenu(forceClose = false) {
            const menu = document.getElementById("menu");
            const overlay = document.getElementById("overlay");

            if (forceClose) {
                menu.classList.remove("open");
                overlay.classList.remove("show");
                return;
            }

            menu.classList.toggle("open");
            overlay.classList.toggle("show");
        }

        function navigateAndClose(page, param = null) {
            toggleMenu(true);
            navigate(page, param);
        }
    </script>
</head>

<body>

<header>
    <div style="font-size:18px;font-weight:600;">מערכת שיבוצים</div>
    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu(true)"></div>

<div class="layout">

    <nav id="menu" class="menu">
        <a onclick="navigateAndClose('home')">📅 מערכת שעות</a>
        <a onclick="navigateAndClose('visit_add')">➕ הוספת שיבוץ</a>
        <a onclick="navigateAndClose('children')">👧 ניהול ילדים</a>
    </nav>

    <main class="content-wrapper">
        <div id="app" class="card">טוען...</div>
    </main>

</div>

<script src="/static/app.js"></script>
</body>
</html>
