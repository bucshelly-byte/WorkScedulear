<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת שיבוצים</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #6366f1;
            --accent-soft: #4f46e5;
            --accent-light: #a5b4fc;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --border-subtle: #1f2937;
            --danger: #f97373;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
            color: var(--text-main);
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(148,163,184,0.2);
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4f46e5, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .burger {
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 50px);
        }

        nav.menu {
            width: 230px;
            background: rgba(15,23,42,0.9);
            border-left: 1px solid rgba(148,163,184,0.2);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        nav.menu a {
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav.menu a:hover {
            background: rgba(255,255,255,0.12);
        }

        .content-wrapper {
            flex: 1;
            padding: 16px;
        }

        .card {
            background: rgba(15,23,42,0.9);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(148,163,184,0.2);
        }

        h2 {
            margin: 0 0 10px;
            font-size: 18px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .field label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .field input,
        .field select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(148,163,184,0.3);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            font-size: 14px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            background: var(--accent);
            color: white;
        }

        .btn.secondary {
            background: rgba(255,255,255,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid rgba(148,163,184,0.1);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
        }

        .icon-btn {
            cursor: pointer;
            margin-left: 6px;
            font-size: 16px;
        }
    </style>

    <script>
        const KEY = "ShellySecureKey_9843_2024_XYZ";
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("open");
        }
    </script>
</head>

<body>
<header>
    <div class="brand">
        <div class="brand-icon">WS</div>
        <div>
            <div style="font-size:15px;font-weight:600;">מערכת שיבוצים</div>
            <div style="font-size:12px;color:#9ca3af;">ניהול ילדים ושיבוצים</div>
        </div>
    </div>
    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<div class="layout">
    <nav id="menu" class="menu">
        <a onclick="navigate('home')">📅 מבט שבועי</a>
        <a onclick="navigate('visit_add')">➕ הוספת שיבוץ</a>
        <a onclick="navigate('children')">👧 ניהול ילדים</a>
    </nav>

    <main class="content-wrapper">
        <div id="app" class="card">טוען...</div>
    </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
