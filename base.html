<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת שיבוצים</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #6366f1;
            --accent-soft: #4f46e5;
            --accent-light: #a5b4fc;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --border-subtle: #1f2937;
            --danger: #f97373;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
            color: var(--text-main);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            width: 26px;
            height: 26px;
            border-radius: 10px;
            background: radial-gradient(circle at 30% 0, #a855f7, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        #pageTitle {
            font-size: 16px;
            font-weight: 600;
        }

        .burger {
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(15, 23, 42, 0.7);
        }

        .burger:hover {
            background: rgba(30, 64, 175, 0.6);
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 52px);
        }

        .menu {
            width: 230px;
            background: rgba(15, 23, 42, 0.9);
            border-left: 1px solid rgba(148, 163, 184, 0.15);
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding-inline: 6px;
        }

        .menu a {
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 13px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
        }

        .menu a span.icon {
            font-size: 16px;
        }

        .menu a:hover {
            background: rgba(55, 65, 81, 0.7);
            border-color: rgba(129, 140, 248, 0.5);
        }

        .content-wrapper {
            flex: 1;
            padding: 14px;
        }

        .content-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 14px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
        }

        h2 {
            margin: 0 0 10px;
            font-size: 17px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn {
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid rgba(129, 140, 248, 0.7);
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn.secondary {
            background: transparent;
            border-color: rgba(148, 163, 184, 0.7);
            color: var(--text-main);
        }

        .btn.danger {
            border-color: rgba(248, 113, 113, 0.7);
            background: linear-gradient(135deg, #b91c1c, #ef4444);
        }

        .btn:hover {
            filter: brightness(1.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead {
            background: rgba(15, 23, 42, 0.9);
        }

        th, td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(31, 41, 55, 0.9);
            text-align: right;
            white-space: nowrap;
        }

        th {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 11px;
        }

        tr:nth-child(even) td {
            background: rgba(15, 23, 42, 0.7);
        }

        .icon-btn {
            cursor: pointer;
            font-size: 16px;
            margin-left: 4px;
            opacity: 0.85;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px 12px;
            margin-top: 6px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .field input,
        .field select {
            border-radius: 10px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            background: rgba(15, 23, 42, 0.9);
            padding: 6px 9px;
            font-size: 12px;
            color: var(--text-main);
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: rgba(129, 140, 248, 0.9);
            box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.5);
        }

        .form-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: flex-start;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }
            .menu {
                position: fixed;
                top: 52px;
                right: -260px;
                height: calc(100vh - 52px);
                z-index: 30;
                transition: right 0.25s ease-out;
            }
            .menu.open {
                right: 0;
            }
        }
    </style>

    <script>
        const KEY = "ShellySecureKey_9843_2024_XYZ";

        function toggleMenu() {
            const m = document.getElementById("menu");
            m.classList.toggle("open");
        }

        function closeMenu() {
            const m = document.getElementById("menu");
            m.classList.remove("open");
        }
    </script>
</head>

<body>
<header>
    <div class="brand">
        <div class="brand-icon">WS</div>
        <div>
            <div style="font-size:13px;font-weight:600;">מערכת שיבוצים</div>
            <div style="font-size:11px;color:#9ca3af;">ניהול ילדים ושיבוצים שבועיים</div>
        </div>
    </div>
    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<div class="layout">
    <nav id="menu" class="menu">
        <div class="menu-title">ניווט</div>
        <a onclick="closeMenu(); navigate('home')">
            <span class="icon">📅</span>
            <span>מבט שבועי</span>
        </a>
        <a onclick="closeMenu(); navigate('visit_add')">
            <span class="icon">➕</span>
            <span>הוספת שיבוץ</span>
        </a>
        <a onclick="closeMenu(); navigate('children')">
            <span class="icon">👧</span>
            <span>ניהול ילדים</span>
        </a>
    </nav>

    <main class="content-wrapper">
        <div class="content-inner">
            <div id="app" class="card">
                טוען...
            </div>
        </div>
    </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
