<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת שיבוצים</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #6366f1;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-direction: row-reverse;
            border-bottom: 1px solid rgba(148,163,184,0.2);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1001;
        }

        .burger {
            font-size: 24px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* OVERLAY BACKGROUND */
        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 998;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* MENU (SLIDE FROM RIGHT) */
        nav.menu {
            width: 260px;
            background: rgba(15,23,42,0.97);
            border-left: 1px solid rgba(148,163,184,0.2);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;

            position: fixed;
            top: 0;
            right: -300px;
            height: 100vh;
            transition: right 0.35s ease;
            z-index: 999;
        }

        nav.menu.open {
            right: 0;
        }

        nav.menu a {
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            text-decoration: none;
            font-size: 15px;
        }

        nav.menu a:hover {
            background: rgba(255,255,255,0.12);
        }

        /* DESKTOP MODE */
        @media (min-width: 900px) {
            .overlay { display: none; }
            nav.menu {
                position: static;
                height: auto;
                right: 0;
                width: 230px;
            }
        }

        /* CONTENT */
        .layout {
            display: flex;
            min-height: calc(100vh - 50px);
        }

        .content-wrapper {
            flex: 1;
            padding: 16px;
        }

        .card {
            background: rgba(15,23,42,0.9);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(148,163,184,0.2);
        }
    </style>

    <script>
        const KEY = "ShellySecureKey_9843_2024_XYZ";

        function toggleMenu() {
            const menu = document.getElementById("menu");
            const overlay = document.getElementById("overlay");

            menu.classList.toggle("open");
            overlay.classList.toggle("show");
        }
    </script>
</head>

<body>

<header>
    <div style="font-size:18px;font-weight:600;">מערכת שיבוצים</div>
    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="layout">

    <nav id="menu" class="menu">
        <a onclick="navigate('home'); toggleMenu()">📅 מבט שבועי</a>
        <a onclick="navigate('visit_add'); toggleMenu()">➕ הוספת שיבוץ</a>
        <a onclick="navigate('children'); toggleMenu()">👧 ניהול ילדים</a>
    </nav>

    <main class="content-wrapper">
        <div id="app" class="card">טוען...</div>
    </main>

</div>

<script src="/static/app.js"></script>
</body>
</html>
