<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת שיבוצים</title>

    <style>
        body {
            margin: 0;
            font-family: "Alef", Arial, sans-serif;
            background: #f7f4ff;
            color: #333;
        }

        header {
            background: #b79cff;
            padding: 14px 18px;
            font-size: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            direction: rtl;
        }

        #pageTitle {
            font-weight: bold;
        }

        .burger {
            font-size: 26px;
            cursor: pointer;
            margin-right: 10px;
        }

        .menu {
            position: fixed;
            top: 0;
            right: -260px;
            width: 260px;
            height: 100%;
            background: #ffffff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.15);
            padding: 20px;
            transition: 0.3s;
            z-index: 999;
        }

        .menu.open {
            right: 0;
        }

        .menu a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            background: #e8d9ff;
            color: #5a3e9b;
            text-decoration: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
        }

        .menu a:hover {
            background: #d7c2ff;
        }

        .content {
            padding: 18px;
        }

        h2 {
            margin-top: 0;
            color: #4b3a8f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        th {
            background: #e8d9ff;
            padding: 10px;
            font-size: 15px;
            text-align: right;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:nth-child(even) td {
            background: #faf7ff;
        }

        .btn {
            background: #b48cff;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin: 6px 0;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #a378ff;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #b48cff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #a378ff;
        }

        .icon-btn {
            cursor: pointer;
            font-size: 20px;
            margin-left: 6px;
        }
    </style>

    <script>
        const KEY = "ShellySecureKey_9843_2024_XYZ";

        function toggleMenu() {
            document.getElementById("menu").classList.toggle("open");
        }

        function closeMenu() {
            document.getElementById("menu").classList.remove("open");
        }
    </script>
</head>

<body>
<header>
    <div id="pageTitle">מערכת שיבוצים</div>
    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<div id="menu" class="menu">
    <a onclick="closeMenu(); navigate('home')">מבט שבועי</a>
    <a onclick="closeMenu(); navigate('visit_add')">הוספת שיבוץ</a>
    <a onclick="closeMenu(); navigate('children')">ניהול ילדים</a>
</div>

<div id="app" class="content">
    טוען...
</div>

<script src="/static/app.js"></script>
</body>
</html>
