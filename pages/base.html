<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ניהול</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- html2canvas נשאר אם תרצי בעתיד, כרגע אנחנו משתמשים ב-canvas ישירות -->

</head>

<body>
