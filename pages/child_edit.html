<h2 class="page-header">עריכת פרטי ילד</h2>

<div class="form-container">
    <form id="childEditForm">
        <!-- ה־JS שלך ימלא את השדות לפי ה־ID של הילד -->

        <div class="form-row">
            <label for="childName">שם הילד:</label>
            <input type="text" id="childName" name="name" class="input-field" required>
        </div>

        <div class="form-row">
            <label for="parentName">שם הורה:</label>
            <input type="text" id="parentName" name="parent_name" class="input-field">
        </div>

        <div class="form-row">
            <label for="phone">טלפון:</label>
            <input type="text" id="phone" name="phone" class="input-field">
        </div>

        <div class="form-row">
            <label for="address">כתובת:</label>
            <input type="text" id="address" name="address" class="input-field">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary-btn">שמור</button>
        </div>
    </form>
</div>
