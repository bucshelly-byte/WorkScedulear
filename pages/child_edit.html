<h2>עריכת ילד</h2>
<div class="subtitle">עדכון פרטי ילד קיים</div>

<input type="hidden" id="childId">

<div class="form-grid">
    <div class="field">
        <label>שם הילד</label>
        <input id="name">
    </div>
    <div class="field">
        <label>שם ההורה</label>
        <input id="parent_name">
    </div>
    <div class="field">
        <label>טלפון</label>
        <input id="phone">
    </div>
    <div class="field">
        <label>כתובת</label>
        <input id="address">
    </div>
</div>

<div style="margin-top:12px;">
    <button class="btn" onclick="saveEdit()">שמור</button>
    <button class="btn secondary" onclick="navigate('children')">ביטול</button>
</div>
