<div class="page-header">עריכת ילד</div>

<div class="form-container">
    <form id="childEditForm">

        <div class="form-row">
            <label>שם הילד:</label>
            <input id="childName" type="text" name="name" class="input-field" required>
        </div>

        <div class="form-row">
            <label>שם הורה:</label>
            <input id="parentName" type="text" name="parent_name" class="input-field">
        </div>

        <div class="form-row">
            <label>טלפון:</label>
            <input id="phone" type="text" name="phone" class="input-field">
        </div>

        <div class="form-row">
            <label>כתובת:</label>
            <input id="address" type="text" name="address" class="input-field">
        </div>

        <div class="form-actions">
            <button class="btn primary-btn" type="submit">שמור</button>
        </div>

    </form>
</div>
