<div class="form-container">
    <h2>עריכת פרטי ילד</h2>
    <p>עדכני את הפרטים ולחצי שמירה.</p>

    <form id="childEditForm">

        <label>שם הילד</label>
        <input type="text" id="childName" name="name" required>

        <label>שם הורה</label>
        <input type="text" id="parentName" name="parent_name">

        <label>טלפון</label>
        <input type="text" id="phone" name="phone">

        <label>כתובת</label>
        <input type="text" id="address" name="address">

        <button class="btn primary-btn" type="submit">שמירה</button>
    </form>
</div>
