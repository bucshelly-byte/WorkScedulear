<div class="page-header">הוספת ילד</div>

<div class="form-container">
    <form id="childAddForm">

        <div class="form-row">
            <label>שם הילד:</label>
            <input type="text" name="name" class="input-field" required>
        </div>

        <div class="form-row">
            <label>שם הורה:</label>
            <input type="text" name="parent_name" class="input-field">
        </div>

        <div class="form-row">
            <label>טלפון:</label>
            <input type="text" name="phone" class="input-field">
        </div>

        <div class="form-row">
            <label>כתובת:</label>
            <input type="text" name="address" class="input-field">
        </div>

        <div class="form-actions">
            <button class="btn primary-btn" type="submit">שמור</button>
        </div>

    </form>
</div>
