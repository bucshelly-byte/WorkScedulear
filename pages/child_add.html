<h2>הוספת ילד</h2>
<div class="subtitle">יצירת כרטיס ילד חדש</div>

<div class="form-grid">
    <div class="field">
        <label>שם הילד</label>
        <input id="name" placeholder="לדוגמה: נועה כהן">
    </div>
    <div class="field">
        <label>שם ההורה</label>
        <input id="parent_name" placeholder="לדוגמה: יעל כהן">
    </div>
    <div class="field">
        <label>טלפון</label>
        <input id="phone" placeholder="050-1234567">
    </div>
    <div class="field">
        <label>כתובת</label>
        <input id="address" placeholder="רחוב, עיר">
    </div>
</div>

<div class="form-actions">
    <button class="btn" onclick="saveChild()">שמור</button>
    <button class="btn secondary" onclick="navigate('children')">ביטול</button>
</div>

<script>
function init_child_add() {}

async function saveChild() {
    const name = document.getElementById("name").value.trim();
    if (!name) {
        alert("חובה למלא שם ילד");
        return;
    }

    const form = new FormData();
    form.append("name", name);
    form.append("parent_name", document.getElementById("parent_name").value.trim());
    form.append("phone", document.getElementById("phone").value.trim());
    form.append("address", document.getElementById("address").value.trim());

    const res = await fetch(`/api/children/add?key=${KEY}`, {
        method: "POST",
        body: form
    });

    if (res.ok) navigate("children");
    else alert("שגיאה בשמירה");
}
</script>
