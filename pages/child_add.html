<div class="form-container">
    <h2>הוספת ילד חדש</h2>
    <p>מלאי את הפרטים כדי להוסיף ילד למערכת.</p>

    <form id="childAddForm">

        <label>שם הילד</label>
        <input type="text" name="name" required>

        <label>שם הורה</label>
        <input type="text" name="parent_name">

        <label>טלפון</label>
        <input type="text" name="phone">

        <label>כתובת</label>
        <input type="text" name="address">

        <button class="btn primary-btn" type="submit">הוספה</button>
    </form>
</div>
