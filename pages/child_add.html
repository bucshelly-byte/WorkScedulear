<h2>הוספת ילד</h2>

<label>שם הילד</label>
<input id="name">

<label>שם ההורה</label>
<input id="parent_name">

<label>טלפון</label>
<input id="phone">

<label>כתובת</label>
<input id="address">

<button onclick="saveChild()">שמור</button>

<script>
async function init_child_add() {}

async function saveChild() {
    const form = new FormData();
    form.append("name", document.getElementById("name").value);
    form.append("parent_name", document.getElementById("parent_name").value);
    form.append("phone", document.getElementById("phone").value);
    form.append("address", document.getElementById("address").value);

    const res = await fetch(`/api/children/add?key=${KEY}`, {
        method: "POST",
        body: form
    });

    if (res.ok) {
        navigate("children");
    } else {
        alert("שגיאה בשמירה");
    }
}
</script>
