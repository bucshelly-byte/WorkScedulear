<div class="page">
    <h1>הוספת שיבוץ</h1>

    <div>
        <label>בחר ילד:</label><br>
        <select id="child_id"></select>
    </div>

    <div>
        <label>יום:</label><br>
        <select id="day">
            <option value="ראשון">ראשון</option>
            <option value="שני">שני</option>
            <option value="שלישי">שלישי</option>
            <option value="רביעי">רביעי</option>
            <option value="חמישי">חמישי</option>
        </select>
    </div>

    <div>
        <label>שעת התחלה:</label><br>
        <input id="start_time" type="time">
    </div>

    <div>
        <label>שעת סיום:</label><br>
        <input id="end_time" type="time">
    </div>

    <br>
    <button class="export-btn" onclick="saveVisit()">שמירה</button>
</div>
