<h2 class="page-header">הוספת שיבוץ</h2>

<div class="form-container">
    <form id="visitAddForm">
        <div class="form-row">
            <label for="childId">ילד:</label>
            <select id="childId" name="child_id" class="input-field" required>
                <!-- ה־JS ימלא את רשימת הילדים -->
            </select>
        </div>

        <div class="form-row">
            <label for="day">יום:</label>
            <select id="day" name="day" class="input-field" required>
                <option value="ראשון">ראשון</option>
                <option value="שני">שני</option>
                <option value="שלישי">שלישי</option>
                <option value="רביעי">רביעי</option>
                <option value="חמישי">חמישי</option>
                <option value="שישי">שישי</option>
                <option value="שבת">שבת</option>
            </select>
        </div>

        <div class="form-row">
            <label for="startTime">שעת התחלה:</label>
            <input type="time" id="startTime" name="start_time" class="input-field" required>
        </div>

        <div class="form-row">
            <label for="endTime">שעת סיום:</label>
            <input type="time" id="endTime" name="end_time" class="input-field" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary-btn">שמור</button>
        </div>
    </form>
</div>
