<h2>הוספת שיבוץ</h2>

<div class="form-grid">

    <div class="field">
        <label>בחר ילד</label>
        <select id="childSelect"></select>
    </div>

    <div class="field">
        <label>יום</label>
        <select id="day">
            <option value="ראשון">ראשון</option>
            <option value="שני">שני</option>
            <option value="שלישי">שלישי</option>
            <option value="רביעי">רביעי</option>
            <option value="חמישי">חמישי</option>
        </select>
    </div>

    <div class="field">
        <label>שעת התחלה</label>
        <select id="start_time"></select>
    </div>

    <div class="field">
        <label>שעת סיום</label>
        <select id="end_time"></select>
    </div>

</div>

<br>

<button class="btn" onclick="saveVisit()">שמור</button>
<button class="btn secondary" onclick="navigate('home')">ביטול</button>
