<div class="form-container">
    <h2>הוספת שיבוץ</h2>
    <p>בחרי ילד, ימים ושעות כדי להוסיף שיבוץ חדש.</p>

    <form id="visitAddForm">

        <label>בחרי ילד</label>
        <select id="childId" name="child_id" required></select>

        <label>בחרי ימים</label>
        <div id="dayButtons"></div>

        <label>שעת התחלה</label>
        <select id="startTime" name="start_time" required></select>

        <label>שעת סיום</label>
        <select id="endTime" name="end_time" required></select>

        <button class="btn primary-btn" type="submit">הוספה</button>
    </form>
</div>
