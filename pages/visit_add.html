<h2>הוספת שיבוץ</h2>

<div class="form-grid">

    <div class="field">
        <label>בחר ילד</label>
        <select id="childSelect"></select>
    </div>

    <div class="field">
        <label>בחר ימים</label>
        <div>
            <label><input type="checkbox" class="day-checkbox" value="ראשון" onchange="onDaysChangeAdd()"> ראשון</label><br>
            <label><input type="checkbox" class="day-checkbox" value="שני" onchange="onDaysChangeAdd()"> שני</label><br>
            <label><input type="checkbox" class="day-checkbox" value="שלישי" onchange="onDaysChangeAdd()"> שלישי</label><br>
            <label><input type="checkbox" class="day-checkbox" value="רביעי" onchange="onDaysChangeAdd()"> רביעי</label><br>
            <label><input type="checkbox" class="day-checkbox" value="חמישי" onchange="onDaysChangeAdd()"> חמישי</label>
        </div>
    </div>

    <div class="field">
        <label>שעת התחלה</label>
        <select id="start_time"></select>
    </div>

    <div class="field">
        <label>שעת סיום</label>
        <select id="end_time"></select>
    </div>

</div>

<br>

<button class="btn" onclick="saveVisit()">שמור</button>
<button class="btn secondary" onclick="navigate('home')">ביטול</button>
