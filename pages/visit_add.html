<h2>הוספת שיבוץ</h2>
<div class="subtitle">יצירת שיבוץ חדש</div>

<div class="form-grid">
    <div class="field">
        <label>ילד</label>
        <select id="childSelect"></select>
    </div>
    <div class="field">
        <label>יום</label>
        <select id="day">
            <option>ראשון</option>
            <option>שני</option>
            <option>שלישי</option>
            <option>רביעי</option>
            <option>חמישי</option>
            <option>שישי</option>
        </select>
    </div>
    <div class="field">
        <label>התחלה</label>
        <input type="time" id="start_time">
    </div>
    <div class="field">
        <label>סיום</label>
        <input type="time" id="end_time">
    </div>
</div>

<div style="margin-top:12px;">
    <button class="btn" onclick="saveVisit()">שמור</button>
    <button class="btn secondary" onclick="navigate('home')">ביטול</button>
</div>
