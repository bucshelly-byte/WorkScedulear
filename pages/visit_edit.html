<div class="page-header">עריכת שיבוץ</div>

<div class="form-container">
    <form id="visitEditForm">

        <div class="form-row">
            <label>בחרי ילד:</label>
            <select id="childId" name="child_id" class="input-field"></select>
        </div>

        <div class="form-row">
            <label>יום:</label>
            <select id="day" name="day" class="input-field">
                <option>ראשון</option>
                <option>שני</option>
                <option>שלישי</option>
                <option>רביעי</option>
                <option>חמישי</option>
                <option>שישי</option>
                <option>שבת</option>
            </select>
        </div>

        <div class="form-row">
            <label>שעת התחלה:</label>
            <select id="startTime" name="start_time" class="input-field"></select>
        </div>

        <div class="form-row">
            <label>שעת סיום:</label>
            <select id="endTime" name="end_time" class="input-field"></select>
        </div>

        <div class="form-actions">
            <button class="btn primary-btn" type="submit">שמור</button>
        </div>

    </form>
</div>
